# ═══════════════════════════════════════════════════════════════
# Coilia Agent — 鲚属专研 Agent 配置 (P2)
# ═══════════════════════════════════════════════════════════════
# 借鉴: porpoise-agent/config/agent.yaml (P1 模板)
# 物种配置: config/species/*.yaml (SpeciesRegistry 统一管理)
# 课题组: 淡水渔业研究中心 刘凯研究员

agent:
  name: "Coilia Agent"
  version: "2.0.0"
  description: "鲚属(Coilia)全类群专研 Agent — 洄游生态、耳石微化学、资源评估、群体遗传"
  genus: "Coilia (鲚属)"
  genus_description: "鲚属(Coilia)隶属鲱形目鳀科，中国有4种: 刀鲚(C. nasus)、短颌鲚(C. brachygnathus)、凤鲚(C. mystus)、七丝鲚(C. grayii)"
  default_species: "coilia_nasus"

  species_list:
    - id: "coilia_nasus"
      scientific: "Coilia nasus"
      chinese: ["刀鲚", "长颌鲚", "长江刀鱼", "刀鱼"]
      description: "溯河洄游种，长江三鲜之首，IUCN EN(濒危)"
    - id: "coilia_brachygnathus"
      scientific: "Coilia brachygnathus"
      chinese: ["短颌鲚", "毛花鱼", "毛刀鱼"]
      description: "淡水定居种，曾被认为是刀鲚同物异名"
    - id: "coilia_mystus"
      scientific: "Coilia mystus"
      chinese: ["凤鲚", "凤尾鱼", "烤子鱼"]
      description: "沿海洄游种，长江口重要经济鱼类"
    - id: "coilia_grayii"
      scientific: "Coilia grayii"
      chinese: ["七丝鲚", "白春", "马刀"]
      description: "河口半咸水种，分布于华南沿海"

  research_group: "淡水渔业研究中心 刘凯研究员课题组"
  role: "P2 (Porpoise-parallel Specialist)"

  activation_keywords:
    chinese:
      - 刀鲚, 长颌鲚, 刀鱼, 长江刀鱼, 短颌鲚, 凤鲚, 七丝鲚
      - 鲚属, 鳀科, 洄游, 溯河, 耳石, 微化学, Sr/Ca, 资源量, 禁捕
      - 产卵场, 补充群体, 仔鱼
    english:
      - Coilia nasus, Coilia brachygnathus, Coilia mystus, Coilia grayii
      - tapertail anchovy, grenadier anchovy
      - otolith microchemistry, anadromous migration, stock assessment
    related_species:
      - "短颌鲚 (Coilia brachygnathus)"
      - "凤鲚 (Coilia mystus)"
      - "七丝鲚 (Coilia grayii)"

  skills:
    external:
      - name: "search-literature"
        description: "中英双语文献检索 — 通过 cognitive-search-engine DirectLoader"
        path: "src/skills/search-literature/SKILL.md"
      - name: "analyze-migration"
        description: "耳石微化学数据解析 — Sr/Ca比、LA-ICP-MS数据处理"
        path: "src/skills/analyze-migration/SKILL.md"
      - name: "assess-stock"
        description: "资源评估 — CPUE标准化、种群动态模型、MSY估算"
        path: "src/skills/assess-stock/SKILL.md"
      - name: "analyze-genetics"
        description: "群体遗传学 — 微卫星/线粒体/SNP数据分析"
        path: "src/skills/analyze-genetics/SKILL.md"
      - name: "analyze-feeding"
        description: "食性与营养生态 — 胃含物、稳定同位素、DNA宏条形码"
        path: "src/skills/analyze-feeding/SKILL.md"
      - name: "analyze-early-life"
        description: "早期资源与繁殖 — 产卵场评估、仔鱼资源量、补充群体动态"
        path: "src/skills/analyze-early-life/SKILL.md"
    inline_phases:
      - name: "report-generation"
        description: "综合报告生成 — 合并所有阶段发现 (内联管线阶段)"

  pipeline:
    phases:
      - "文献调研 (Literature Review)"
      - "数据分析 (Data Analysis — 耳石/遗传/资源)"
      - "野外调查 (Field Survey — 产卵场/洄游监测)"
      - "资源评估 (Stock Assessment)"
      - "报告生成 (Report Generation)"

architecture:
  # S-T-V-P1-P2 五体架构: eon-core (10层内核) 统一协调
  # P 层专研由本 Agent 负责
  layer: "P (Specialist)"
  sister_agent: "porpoise-agent (P1/V2, 长江江豚)"
  coordinator: "eon-core"

# ═══════════════════════════════════════════════════════════
# Shared — 跨项目共享配置 (与其他 agent.yaml 对齐)
# ═══════════════════════════════════════════════════════════
shared:
  version: "1.2.0"
  philosophy: "Panta Rhei + Systems Thinking"
  architecture: "S-T-V-P1-P2 (三角派生 P2/V3)"
  rule_count: 18
  coordination_file: "coordination.yaml"
  preflight: "read config/agent.yaml before all Skills"
