# ═══════════════════════════════════════════════════════════════
# Coilia Agent — 刀鲚专研 Agent 配置 (P₂)
# ═══════════════════════════════════════════════════════════════
# 借鉴: porpoise-agent/config/agent.yaml (P₁ 模板)
# 课题组: 淡水渔业研究中心 刘凯研究员

agent:
  name: "Coilia Agent"
  version: "1.0.0"
  description: "刀鲚专研 Agent — 洄游生态、耳石微化学、资源评估、群体遗传"
  species: "Coilia nasus (刀鲚/长江刀鱼)"
  research_group: "淡水渔业研究中心 刘凯研究员课题组"
  role: "P₂ (Porpoise-parallel Specialist)"
  
  activation_keywords:
    chinese:
      - 刀鲚, 长颌鲚, 刀鱼, 长江刀鱼, 鲚属, 鳀科
      - 洄游, 溯河, 耳石, 微化学, Sr/Ca, 资源量, 禁捕
      - 产卵场, 补充群体, 仔鱼, 短颌鲚, 凤鲚
    english:
      - Coilia nasus, tapertail anchovy, estuarine tapertail anchovy
      - otolith microchemistry, anadromous migration, stock assessment
    related_species:
      - "短颌鲚 (Coilia brachygnathus)"
      - "凤鲚 (Coilia mystus)"

  skills:
    core:
      - name: "search-literature"
        description: "中英双语文献检索 — PubMed/CNKI/万方/Google Scholar"
      - name: "analyze-migration"
        description: "耳石微化学数据解析 — Sr/Ca比、LA-ICP-MS数据处理"
      - name: "assess-stock"
        description: "资源评估 — CPUE标准化、种群动态模型、MSY估算"
    domain:
      - name: "analyze-genetics"
        description: "群体遗传学 — 微卫星/线粒体/SNP分析"
      - name: "analyze-diet"
        description: "食性分析 — 胃含物+稳定同位素+DNA宏条形码"
      - name: "assess-habitat"
        description: "产卵场/栖息地评估"

  pipeline:
    phases:
      - "文献调研 (Literature Review)"
      - "数据分析 (Data Analysis — 耳石/遗传/资源)"
      - "野外调查 (Field Survey — 产卵场/洄游监测)"
      - "资源评估 (Stock Assessment)"
      - "报告生成 (Report Generation)"

architecture:
  # 借鉴 porpoise-agent 的 T/P 双层架构
  # T 层协调由 meso-cosmos-agent 负责
  # P 层专研由本 Agent 负责
  layer: "P (Specialist)"
  sister_agent: "porpoise-agent (P₁, 长江江豚)"
  coordinator: "meso-cosmos-agent (T)"
