name: Validate
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyyaml pytest

      # 语法检查
      - run: |
          for f in src/main.py src/adapter.py src/agent/orchestrator.py; do
            python -c "import ast; ast.parse(open('$f').read()); print(f'✅ $f')"
          done

      # YAML 验证
      - run: python -c "import yaml; yaml.safe_load(open('config/agent.yaml')); print('✅ agent.yaml')"

      # SKILL.md 完整性
      - run: |
          skills=$(ls src/skills/*/SKILL.md 2>/dev/null | wc -l)
          echo "✅ $skills SKILL.md files"
          [ $skills -ge 2 ]

      # 测试语法检查 (import 依赖 D:/Reasonix 层, CI 中仅做语法验证)
      - run: |
          for f in tests/test_coilia.py tests/triangle_flow.py; do
            python -c "import ast; ast.parse(open('$f').read()); print(f'✅ $f')"
          done

      # SKILL.md 引用协议检查
      - run: |
          grep -q "Unified Search Protocol" src/skills/search-literature/SKILL.md && echo "✅ SKILL.md references Unified Search Protocol"
