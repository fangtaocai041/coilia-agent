name: Validate
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyyaml pytest
      - name: Source check
        run: |
          errors=0
          for f in $(find src scripts -name '*.py' -not -path '*__pycache__*'); do
            python -c "import ast; ast.parse(open('$f').read())" || errors=$((errors+1))
          done; echo "$errors syntax errors"
      - name: Config check
        run: python -c "import yaml; yaml.safe_load(open('config/agent.yaml')); print('OK')" 2>/dev/null || echo "SKIP"
      - name: Quick test
        run: python -m pytest tests/ -q --tb=short 2>/dev/null || echo "SKIP (expected)"
