name: Validate
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyyaml pytest
      - run: pip install -e . 2>/dev/null || true

      # Source syntax check
      - run: |
          for f in src/main.py src/adapter.py src/agent/orchestrator.py; do
            python -c "import ast; ast.parse(open('$f').read()); print(f'✅ $f')"
          done

      # Analysis scripts syntax check (dynamic discovery)
      - run: |
          for f in scripts/*.py; do
            [ "$f" = "scripts/shared_types.py" ] && continue
            echo "Checking $f..."
            python -c "import ast; ast.parse(open('$f').read())" || echo "⚠️ $f syntax check failed, continuing..."
          done
          echo "✅ Scripts syntax check complete"

      # YAML validation (agent + species configs)
      - run: |
          python -c "import yaml; yaml.safe_load(open('config/agent.yaml')); print('✅ agent.yaml')"
          for f in config/species/*.yaml; do
            python -c "import yaml; yaml.safe_load(open('$f')); print('✅ $f')"
          done 2>/dev/null || echo "⚠️ No species YAML found (may be normal)"

      # SKILL.md presence check (>= 5)
      - run: |
          skills=$(find src/skills -name 'SKILL.md' 2>/dev/null | wc -l)
          echo "✅ $skills SKILL.md files found"
          [ $skills -ge 5 ]

      # Test file syntax check
      - run: |
          for f in tests/*.py; do
            python -c "import ast; ast.parse(open('$f').read()); print(f'✅ $f')"
          done

      # Run actual tests (skip integration-only)
      - run: python -m pytest tests/ -q --tb=short -k "not triangle_flow" --ignore=tests/test_triangle_integration.py
